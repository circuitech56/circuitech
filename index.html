<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuitech</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* HEADER */
header {
    background: #111;
    padding: 20px;
    position: relative;
}

.logo {
    width: 80px;
    border-radius: 50%;
}

h1 {
    margin: 10px 0 5px;
    color: cyan;
}

.tagline {
    color: #aaa;
}

/* REPORT ICON */
.report-icon {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 22px;
    cursor: pointer;
    color: white;
    transition: 0.3s;
}

.report-icon:hover {
    color: cyan;
    transform: scale(1.1);
}

/* LOADER */
.loader-screen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.loader-text {
    font-size: 26px;
    color: cyan;
    margin-bottom: 20px;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #222;
    border-top: 5px solid cyan;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* DRONE */
.drone {
    position: fixed;
    top: -100px;
    left: -100px;
    font-size: 40px;
    display: none;
}

.drone.fly {
    display: block;
    animation: flyDrone 1.5s ease forwards;
}

@keyframes flyDrone {
    0% {
        top: -100px;
        left: -100px;
    }
    100% {
        top: 260px;
        left: 50%;
        transform: translateX(-50%);
    }
}

/* BEAM */
.beam {
    position: fixed;
    top: 310px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    background: rgba(0,255,255,0.2);
    display: none;
}

.beam.show {
    display: block;
    animation: beamExpand 0.6s ease forwards;
}

@keyframes beamExpand {
    to {
        width: 260px;
        height: 120px;
    }
}

/* HOME BUTTON */
.home-btn {
    position: fixed;
    top: 340px;
    left: 50%;
    transform: translateX(-50%) scale(0.7);
    padding: 12px 30px;
    background: cyan;
    color: black;
    border-radius: 10px;
    font-weight: bold;
    display: none;
    opacity: 0;
    cursor: pointer;
}

.home-btn.show {
    display: block;
    animation: popup 0.5s ease forwards;
}

@keyframes popup {
    to {
        opacity: 1;
        transform: translateX(-50%) scale(1);
    }
}

/* REPORT BOX */
.report-box {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    background: #111;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #333;
    width: 300px;
    opacity: 0;
    display: none;
    z-index: 20;
}

.report-box.show {
    display: block;
    animation: popup 0.4s ease forwards;
}

textarea {
    width: 90%;
    height: 80px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    padding: 8px;
}

.btn {
    margin-top: 10px;
    padding: 10px 20px;
    background: cyan;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>

    <!-- REPORT ICON (RESTORED) -->
    <div class="report-icon" onclick="openReport()">
        <i class="fas fa-circle-question"></i>
    </div>

    <img src="logo.png" class="logo">
    <h1>CIRCUITECH</h1>
    <div class="tagline">IoT | Robotics | Automation | Hardware | Software</div>
</header>

<!-- LOADER -->
<div class="loader-screen" id="loader">
    <div class="loader-text">Welcome to Circuitech</div>
    <div class="spinner"></div>
</div>

<!-- DRONE -->
<div class="drone" id="drone">🚁</div>

<!-- BEAM -->
<div class="beam" id="beam"></div>

<!-- HOME BUTTON -->
<div class="home-btn" id="homeBtn" onclick="goHome()">HOME</div>

<!-- REPORT BOX -->
<div class="report-box" id="reportBox">
    <h3>Report</h3>
    <textarea id="reportText" placeholder="Write your report..."></textarea><br>
    <button class="btn" onclick="submitReport()">Submit</button>
</div>

<script>

/* INTRO ANIMATION */
setTimeout(() => {
    document.getElementById("loader").style.display = "none";

    let drone = document.getElementById("drone");
    drone.classList.add("fly");

    setTimeout(() => {
        document.getElementById("beam").classList.add("show");
    }, 1400);

    setTimeout(() => {
        document.getElementById("homeBtn").classList.add("show");
    }, 2000);

}, 3000);

/* HOME */
function goHome() {
    window.location.href = "home.html";
}

/* REPORT */
function openReport() {
    document.getElementById("reportBox").classList.add("show");
}

function submitReport() {
    let text = document.getElementById("reportText").value;

    if (text.trim() === "") {
        alert("Please write something.");
        return;
    }

    alert("Report submitted!");
    document.getElementById("reportText").value = "";
    document.getElementById("reportBox").classList.remove("show");
}
</script>

</body>
</html>
